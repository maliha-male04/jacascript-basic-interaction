<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Basic Interaction</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="page-wrapper">
        <section class="profile-card">
            <div id="profileAvatar" class="profile-avatar">
                JS
            </div>

            <p class="badge">
                Javascript Practice
            </p>

            <h1 id="profileName">
                Hello, Pioneers!
            </h1>

            <h2 id="profileRole">
                Frontend Developer in Progress
            </h2>

            <p id="profileDescription">
                I am learning how javascript makes web pages interactive.
            </p>

            <div id="messageBox" class="message-box">
                Click a button to start the interaction
            </div>

            <div class="button-group">
                <button id="sayHellobutton">Say Hello</button>
                <button id="updateProfileButton">Update Profile</button>
                <button id="resetButton">Reset</button>
            </div>
        </section>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
